spring:
  application:
    name: ${APP_NAME:opulentia}
    key: ${APP_KEY:super-secret-key}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/opulentia}
    username: ${DATABASE_USERNAME:admin}
    password: ${DATABASE_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
